services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - /opt/qdrant/qdrant_storage:/qdrant/storage
      - /opt/qdrant/qdrant_config/production.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?set-in-env-file}
      QDRANT__LOG_LEVEL: INFO
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    command: ["./qdrant", "--config-path", "/qdrant/config/production.yaml"]
    networks:
      - rag_internal

  rag-api:
    build:
      context: ../..
      dockerfile: Dockerfile.api
    container_name: rag-api
    restart: unless-stopped
    depends_on:
      - qdrant
    env_file:
      - ../../.env
    environment:
      QDRANT_URL: http://qdrant:6333
      QUERY_CACHE_DIR: /app/data/cache
      API_KEYS_FILE: /opt/RAG-pipeline/api_keys.json
      API_AUTH_ENABLED: "true"
      MESH_YEAR: "2026"
    volumes:
      - ../../data/cache:/app/data/cache
      - ../../data/mesh:/app/data/mesh
      - ../../api_keys.json:/opt/RAG-pipeline/api_keys.json:ro
    ports:
      - "8000:8000"
    networks:
      - rag_internal

networks:
  rag_internal:
    name: rag_internal
