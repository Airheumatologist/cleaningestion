services:
  qdrant:
    image: qdrant/qdrant:v1.15.4
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - /opt/qdrant/qdrant_storage:/qdrant/storage
      - /opt/qdrant/qdrant_config/production.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?set-in-env-file}
      QDRANT__LOG_LEVEL: INFO
      QDRANT__STORAGE__ON_DISK_PAYLOAD: "true"
    command: ["./qdrant", "--config-path", "/qdrant/config/production.yaml"]
